# config/config.yaml

# BeeGees run name identifier
run_name: "RUN1"
# Path to samples.csv
samples_file: "/PATH/TO/SAMPLES.CSV"
# Path to sequence_references.csv (leave path blank/empty if 'run_gene_fetch' == true)
sequence_reference_file: ""
# Path to output directory. Final dir will be created if it does not exist already.
output_dir: "/PATH/TO/OUTPUT_DIR"


## Fastp QC parameters
# Adapters are selected automatically by run mode:
#   - Paired-end: uses adapter_r1 / adapter_r2 below
#     (leave both empty for the default Illumina TruSeq adapters; set both or neither).
#   - SE (e.g. Ultima, forward only): fastp adapter auto-detection ("auto"), poly-G
#     trimming disabled (flow-based chemistry, not two-colour), and 3' poly-X
#     trimming applied (Ultima poly-T/poly-A homopolymer error rate).
# extra_fastp_args accepts any additional fastp flags as a single quoted string.
fastp:
  adapter_r1: ""          # PE R1 (empty = Illumina default)
  adapter_r2: ""          # PE R2 (empty = Illumina default)
  extra_fastp_args: ""    # applied to both PE and SE


## Gene Fetch parameters (https://github.com/bge-barcoding/gene_fetch), or using `gene-fetch --help`.
run_gene_fetch: true  # Set true to use gene-fetch to generate reference sequences (default: true)
gene_fetch:
   email: "EXAMPLE@EXAMPLE.ac.uk"                # Email for NCBI API
   api_key: "12345678910"                        # NCBI API key
   gene: "coi"                                   # Target gene (e.g., cox1, rbcl, matk)
   type: "both"                                  # Sequence type to fetch: "protein" or "both" (protein + nucleotide)
   minimum_length: "500"                         # Minimum length of protein reference(s) to fetch (default: 500aa)
   input_type: "hierarchical"                           # Does the 'samples.csv' contain a 'taxid' column or 'hierarchical' taxonomic information columns (default: taxid)? - see Gene Fetch docs for more detail
   genbank: true                                 # Download GenBank records for retrieved pseudo-reference sequences


## Downsampling parameters
downsampling:
  enabled: false                                 # Set to true to enable downsampling (default: false)
  max_reads: 0                                   # Maximum number of read PAIRS to process


## MitoGeneExtractor / barcode recovery parameters
# Leave default (as below) for full parameter sweep. r1:s50 is the most relaxed, whilst r1.5:s100 is the most strict.
barcode_recovery:
  r:                                             # Exonerate relative score threshold parameter
    - 1
    - 1.3
    - 1.5
  s:                                             # Exonerate minimum score threshold parameter
    - 50
    - 100
  n: 0                                           # Number of bp to extend beyond the Exonerate alignment
  C: 5                                           # Genetic code table (used by both MitoGeneExtractor and structural validation)
  t: 0.5                                         # Consensus threshold (0-1)


## Post-processing of aligned reads for cleaning (using fasta_cleaner)
# fasta_cleaner undertakes 6 steps - 1:Human cox1 similarity filtering, 2:AT-content filtering compared to consensus, 3:Statistical outlier filtering compared to consensus, 4:Custom reference-based filtering, 5:Consensus Generation, 6:Metrics aggregation. 
# See README.md and docstring of each script (/workflow/scripts) for more detailed parameter information
fasta_cleaner:
  consensus_threshold: 0.5                       # Threshold at which bases at each position must 'agree' to be incldued in the consensus (0-1)
  human_threshold: 0.95                          # Threshold at which reads are removed due to similarity with human COI (0-1)
  at_difference: 0.1                             # Threshold at which reads are removed due to AT content variation (0-1)
  at_mode: "absolute"                            # At content filtering mode (Absolute/Higher/Lower)
  outlier_percentile: 90.0                       # Threshold at which reads are flagged as statistical outliers to the consensus and removed (0-100)
  reference_dir: null                            # Path to directory containing references for filtering (set to null/none if omitting step)
  reference_filter_mode: "remove_similar"        # Filter mode: "keep_similar" (remove outliers) or "remove_similar" (remove sequences similar to reference)


## Structural validation
structural_validation:
  target: "cox1"                                 # Options: cox1/coi or rbcl (maps to corresponding HMM)
  verbose: false                                 # Enable verbose logging
  # Genetic code is taken from barcode_recovery.C above (same value used by MitoGeneExtractor)


## Taxonomic validation
taxonomic_validation:
    blast_db: "/path/to/BOLDistilled/"           # Path to BLASTn database directory or FASTA file
    db_taxonomy: "/PATH/TO/BOLDistilled/BOLDistilled_taxonomy/source/BOLDistilled_COI_Jul2025_TAXONOMY.tsv"
    taxval_rank: "family"                        # Taxonomic rank for validation (phylum, class, order, family, genus, species) (default & recommended: family)
    expected_taxonomy: "/PATH/TO/EXPECTED_TAXONOMY"
                                                 # It must contain the following columns: ID,phylum,class,order,family,genus,speces. ID must equal 'ID' from samples_file above
    verbose: true                                # Enable verbose logging
    min_pident: 80                               # Minimum percent identity (pident) threshold to be considered (0-100)
    min_length: 100                              # Minimum length of BLASTn alignment to be considered (0-100)


## Resource allocation for each rule. Memory shown in Mb (mem_mb), e.g. 2048 = 2G memory. Rules have dynamic memory scaling upon retry (mem_mb * retry #).
rules:
  gene_fetch:                                    # Gene Fetch
    mem_mb: 8192
    threads: 4
    partition: long
  fastp_qc:                                      # Fastp (merge and concat modes)
    mem_mb: 16384
    threads: 4
  clean_headers_merge:                           # Clean fastq headers (merge mdoe)
    mem_mb: 16384
    threads: 4
  fastq_concat:                                  # Concatentation of fastp QC'd fastq files (concat mode)
    mem_mb: 16384
    threads: 4
  quality_trim:                                  # Trim Galore (concat mode)
    mem_mb: 16384
    threads: 4
  downsample:                                    # Downsampling via reformat.sh (concat/merge/se modes)
    mem_mb: 8192
    threads: 4
  MitoGeneExtractor:                             # MitoGeneExtractor (concat and merge mode)
    mem_mb: 32768
    threads: 8
    partition: himem
  rename_and_combine_cons:                       # Clean and rename fasta headers
    mem_mb: 8192
    threads: 4
  gzip_merged_clean:                             # Gzip *_merged_clean.fastq files
    mem_mb: 16384
    threads: 4
  human_cox1_filter:                             # 01_human_cox1_filter.py
    mem_mb: 32768
    threads: 8
  at_content_filter:                             # 02_at_content_filter.py
    mem_mb: 32768
    threads: 8
  statistical_outlier_filter:                    # 03_statistical_outlier.py
    mem_mb: 32768
    threads: 8
  reference_filter:                              # 04_reference_filter.py
    mem_mb: 4096
    threads: 1
  consensus_generation:                          # 05_consensus_generator.py
    mem_mb: 8192
    threads: 4
  extract_stats_to_csv:                          # mge_stats.py
    mem_mb: 16384
    threads: 4
  structural_validation:                         # structural_validation.py
    mem_mb: 32768
    threads: 16
    partition: himem
  taxonomic_validation:                          # tv_local blast.py
    mem_mb: 51200
    threads: 32                                  # Minimum = 4 (4 threads given to each parallised BLASTn run)
    partition: himem
  blast2taxonomy:                                # tv_blast2taxonomy.py
    mem_mb: 16384
    threads: 4
  download_taxdump:
    threads: 1
    mem_mb: 4096
  multiqc_plots:
    threads: 2
    mem_mb: 8192
  multiqc:
    threads: 1
    mem_mb: 8192
